<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Delivery Pricing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0B0B0B;
            min-height: 100vh;
            padding: 40px 20px;
            color: #E6E6E6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        .logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 4px 20px rgba(47, 191, 142, 0.3));
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #2FBF8E 0%, #1E6F4A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            animation: fadeIn 1s ease;
        }

        .tab-button {
            flex: 1;
            padding: 15px 30px;
            background: #1A1A1A;
            border: 2px solid #1E6F4A;
            border-radius: 12px;
            color: #E6E6E6;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-button:hover {
            border-color: #2FBF8E;
            transform: translateY(-2px);
        }

        .tab-button.active {
            background: linear-gradient(135deg, #2FBF8E 0%, #1E6F4A 100%);
            border-color: #2FBF8E;
            box-shadow: 0 5px 20px rgba(47, 191, 142, 0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .search-box {
            margin-bottom: 30px;
            animation: fadeIn 1s ease;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #1E6F4A;
            border-radius: 12px;
            font-size: 1em;
            background: #1A1A1A;
            color: #E6E6E6;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: #2FBF8E;
            box-shadow: 0 0 0 3px rgba(47, 191, 142, 0.1);
        }

        .search-box input::placeholder {
            color: #9CA3AF;
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            animation: fadeInUp 1s ease;
        }

        .pricing-card, .desk-card {
            background: #1A1A1A;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #0F3D2E;
            transition: all 0.3s ease;
        }

        .pricing-card:hover, .desk-card:hover {
            transform: translateY(-5px);
            border-color: #1E6F4A;
            box-shadow: 0 10px 30px rgba(47, 191, 142, 0.2);
        }

        .city-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #2FBF8E;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .city-name::before {
            content: "📍";
            margin-right: 10px;
            font-size: 1.2em;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(30, 111, 74, 0.2);
        }

        .price-row:last-child {
            border-bottom: none;
        }

        .price-label {
            color: #9CA3AF;
            font-size: 0.95em;
        }

        .price-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #1E6F4A;
        }

        .price-value::after {
            content: " DA";
            font-size: 0.8em;
            color: #9CA3AF;
        }

        .wilaya-header {
            font-size: 1.5em;
            font-weight: bold;
            color: #2FBF8E;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1E6F4A;
        }

        .station-item {
            background: rgba(30, 111, 74, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 3px solid #2FBF8E;
        }

        .station-item:last-child {
            margin-bottom: 0;
        }

        .station-name {
            font-size: 1.1em;
            font-weight: 600;
            color: #E6E6E6;
            margin-bottom: 8px;
        }

        .station-address {
            color: #9CA3AF;
            margin-bottom: 8px;
            display: flex;
            align-items: start;
            gap: 8px;
            font-size: 0.9em;
        }

        .station-address::before {
            content: "📍";
            flex-shrink: 0;
            margin-top: 2px;
        }

        .station-phone {
            color: #2FBF8E;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95em;
            font-weight: 500;
        }

        .station-phone::before {
            content: "📞";
            flex-shrink: 0;
        }

        .return-notice {
            background: linear-gradient(135deg, #1E6F4A 0%, #0F3D2E 100%);
            color: #E6E6E6;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 30px;
            border: 1px solid #2FBF8E;
            animation: fadeIn 1.2s ease;
        }

        .return-notice h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #2FBF8E;
        }

        .return-notice p {
            font-size: 1.8em;
            font-weight: bold;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .no-results {
            text-align: center;
            color: #9CA3AF;
            font-size: 1.2em;
            padding: 40px;
            display: none;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .pricing-grid {
                grid-template-columns: 1fr;
            }

            .logo {
                max-width: 150px;
            }
        }
    </style>
</head>

        function switchTab(tabName) {
            const tabs = document.querySelectorAll('.tab-content');
            const buttons = document.querySelectorAll('.tab-button');
            
            tabs.forEach(tab => tab.classList.remove('active'));
            buttons.forEach(btn => btn.classList.remove('active'));

                document.getElementById('pricingTab').classList.add('active');
                buttons[0].classList.add('active');
            } else {
                document.getElementById('desksTab').classList.add('active');
                buttons[1].classList.add('active');
            }

                        <span class="price-label">Domicile Delivery</span>
                        <span class="price-value">${item.domicile}</span>
                    </div>
                    <div class="price-row">
                        <span class="price-label">Stop Desk Pickup</span>
                        <span class="price-value">${item.stop}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderDeskCards(data) {
            const grid = document.getElementById('desksGrid');
            const noResults = document.getElementById('noResultsDesks');
            
            grid.innerHTML = '';
            
            if (Object.keys(data).length === 0) {
                grid.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            noResults.style.display = 'none';
            
            // Sort wilayas alphabetically
            const sortedWilayas = Object.keys(data).sort();
            
            sortedWilayas.forEach(wilaya => {
                const card = document.createElement('div');
                card.className = 'desk-card';
                
                let stationsHTML = '';
                data[wilaya].forEach(station => {
                    stationsHTML += `
                        <div class="station-item">
                            <div class="station-name">${station.name}</div>
                            <div class="station-address">${station.address}</div>
                            <div class="station-phone">${station.phone}</div>
                        </div>
                    `;
                });
                
                card.innerHTML = `
                    <div class="wilaya-header">${wilaya}</div>
                    ${stationsHTML}
                `;
                grid.appendChild(card);
            });
        }

        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredData = pricingData.filter(item => 
                item.city.toLowerCase().includes(searchTerm)
            );
            renderPricingCards(filteredData);
        });

        const searchInputDesks = document.getElementById('searchInputDesks');
        searchInputDesks.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredData = {};
            
            Object.keys(desksData).forEach(wilaya => {
                const matchingStations = desksData[wilaya].filter(station =>
                    wilaya.toLowerCase().includes(searchTerm) ||
                    station.name.toLowerCase().includes(searchTerm) ||
                    station.address.toLowerCase().includes(searchTerm)
                );
                
                if (matchingStations.length > 0) {
                    filteredData[wilaya] = matchingStations;
                }
            });
            
            renderDeskCards(filteredData);
        });

        renderPricingCards(pricingData);
        renderDeskCards(desksData);
    </script>
</body>
</html>
