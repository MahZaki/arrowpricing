<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Arrow Delivery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0B0B0B;
            min-height: 100vh;
            padding: 20px;
            color: #E6E6E6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        .logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 20px rgba(47, 191, 142, 0.3));
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #2FBF8E 0%, #1E6F4A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-links a {
            padding: 12px 24px;
            background: #1A1A1A;
            color: #2FBF8E;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #1E6F4A;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-links a:hover {
            background: #1E6F4A;
            color: white;
            transform: translateY(-2px);
        }

        .nav-links a.active {
            background: #2FBF8E;
            color: #0B0B0B;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            animation: fadeInUp 1s ease;
        }

        .stat-card {
            background: #1A1A1A;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #1E6F4A;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(47, 191, 142, 0.2);
        }

        .stat-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #9CA3AF;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #2FBF8E;
        }

        .filters-card {
            background: #1A1A1A;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #1E6F4A;
            margin-bottom: 30px;
            animation: fadeInUp 1.2s ease;
        }

        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            color: #9CA3AF;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 10px;
            background: #0B0B0B;
            border: 2px solid #1E6F4A;
            border-radius: 8px;
            color: #E6E6E6;
            font-size: 0.95em;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #2FBF8E;
        }

        .filter-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #2FBF8E 0%, #1E6F4A 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(47, 191, 142, 0.3);
        }

        .orders-card {
            background: #1A1A1A;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #1E6F4A;
            animation: fadeInUp 1.4s ease;
        }

        .orders-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .orders-header h2 {
            color: #2FBF8E;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            border: 3px solid #1E6F4A;
            border-top: 3px solid #2FBF8E;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
            display: block;
        }

        .orders-table thead {
            background: #0B0B0B;
        }

        .orders-table th {
            padding: 15px;
            text-align: left;
            color: #2FBF8E;
            font-weight: 600;
            border-bottom: 2px solid #1E6F4A;
        }

        .orders-table td {
            padding: 15px;
            border-bottom: 1px solid #1E6F4A;
        }

        .orders-table tbody {
            display: table;
            width: 100%;
        }

        .orders-table tbody tr {
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .orders-table tbody tr:hover {
            background: #0B0B0B;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.85em;
            display: inline-block;
        }

        .status-badge.created { background: #3b82f6; color: white; }
        .status-badge.picked { background: #8b5cf6; color: white; }
        .status-badge.in-transit { background: #f59e0b; color: white; }
        .status-badge.delivered { background: #10b981; color: white; }
        .status-badge.returned { background: #ef4444; color: white; }
        .status-badge.suspended { background: #6b7280; color: white; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9CA3AF;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .pagination button {
            padding: 8px 15px;
            background: #0B0B0B;
            color: #2FBF8E;
            border: 1px solid #1E6F4A;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pagination button:hover:not(:disabled) {
            background: #1E6F4A;
            color: white;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: #2FBF8E;
            color: #0B0B0B;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .filters {
                flex-direction: column;
            }

            .filter-group {
                width: 100%;
            }

            .orders-table {
                font-size: 0.85em;
            }

            .orders-table th,
            .orders-table td {
                padding: 10px 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://i.imgur.com/ofuT9Pm.png" alt="Arrow Delivery Logo" class="logo">
            <h1>Orders Dashboard</h1>
        </div>

        <div class="nav-links">
            <a href="#pricing">Pricing</a>
            <a href="#create">Create Order</a>
            <a href="#track">Track Order</a>
            <a href="#dashboard" class="active">Dashboard</a>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-label">Total Orders</div>
                <div class="stat-value" id="totalOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🚚</div>
                <div class="stat-label">In Transit</div>
                <div class="stat-value" id="inTransitOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-label">Delivered</div>
                <div class="stat-value" id="deliveredOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏸️</div>
                <div class="stat-label">Pending</div>
                <div class="stat-value" id="pendingOrders">0</div>
            </div>
        </div>

        <div class="filters-card">
            <div class="filters">
                <div class="filter-group">
                    <label>Search Tracking</label>
                    <input type="text" id="searchTracking" placeholder="Enter tracking number...">
                </div>
                <div class="filter-group">
                    <label>Status</label>
                    <select id="statusFilter">
                        <option value="">All Statuses</option>
                        <option value="created">Created</option>
                        <option value="picked">Picked Up</option>
                        <option value="in-transit">In Transit</option>
                        <option value="delivered">Delivered</option>
                        <option value="returned">Returned</option>
                        <option value="suspended">Suspended</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Date From</label>
                    <input type="date" id="dateFrom">
                </div>
                <div class="filter-group">
                    <label>Date To</label>
                    <input type="date" id="dateTo">
                </div>
            </div>
            <button class="filter-btn" onclick="applyFilters()">🔍 Apply Filters</button>
        </div>

        <div class="orders-card">
            <div class="orders-header">
                <h2>📋 Recent Orders</h2>
                <button class="filter-btn" onclick="loadOrders()">🔄 Refresh</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading orders...</p>
            </div>

            <div id="ordersContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <h3>No orders yet</h3>
                    <p>Create your first order to get started</p>
                </div>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://imir.ecotrack.dz';
        const API_TOKEN = 'qyW7zYNUhC5ssqT6VNpfSMOSlFkwzYaNVA02rha2sPPtpasV9KiRgO1qw52D';

        let allOrders = [];
        let filteredOrders = [];
        let currentPage = 1;
        const ordersPerPage = 10;

        const statusTranslations = {
            'order_information_received_by_carrier': 'Order Registered',
            'prete_a_expedier': 'Ready to Ship',
            'picked': 'Picked Up',
            'en_ramassage': 'Being Collected',
            'vers_hub': 'To Hub',
            'en_hub': 'At Hub',
            'accepted_by_carrier': 'Received at Hub',
            'vers_wilaya': 'To Destination',
            'en_preparation': 'In Preparation',
            'dispatched_to_driver': 'Out for Delivery',
            'en_livraison': 'Out for Delivery',
            'attempt_delivery': 'Delivery Attempt',
            'suspendu': 'Suspended',
            'livre_non_encaisse': 'Delivered - Not Collected',
            'livred': 'Delivered',
            'encaisse_non_paye': 'Collected - Not Paid',
            'encaissed': 'Payment Collected',
            'paiements_prets': 'Payment Ready',
            'payed': 'Payment Completed',
            'paye_et_archive': 'Paid & Archived',
            'return_asked': 'Return Initiated',
            'retour_chez_livreur': 'Return with Driver',
            'return_in_transit': 'Return in Transit',
            'retour_transit_entrepot': 'Return to Warehouse',
            'retour_en_traitement': 'Return Processing',
            'Return_received': 'Return Received',
            'retour_recu': 'Return Received',
            'retour_archive': 'Return Archived',
            'annule': 'Cancelled',
            'notification_on_order': 'Order Updated'
        };

        // Load orders on page load
        window.addEventListener('DOMContentLoaded', loadOrders);

        async function loadOrders() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('ordersContainer').innerHTML = '';

            try {
                const url = `${API_URL}/api/v1/get/tracking/list?api_token=${API_TOKEN}`;
                console.log('Fetching from:', url);
                
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'cors',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                console.log('Response status:', response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Error response:', errorText);
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('Orders API Response:', data);
                console.log('Data structure:', JSON.stringify(data, null, 2));

                // Handle different possible response structures
                if (Array.isArray(data)) {
                    allOrders = data;
                } else if (data && data.data && Array.isArray(data.data)) {
                    allOrders = data.data;
                } else if (data && data.orders && Array.isArray(data.orders)) {
                    allOrders = data.orders;
                } else if (data && typeof data === 'object') {
                    // If it's an object with keys, try to get the values
                    const values = Object.values(data);
                    if (values.length > 0 && Array.isArray(values[0])) {
                        allOrders = values[0];
                    }
                }

                console.log('Processed orders:', allOrders);

                if (allOrders && allOrders.length > 0) {
                    filteredOrders = allOrders;
                    updateStats();
                    displayOrders();
                } else {
                    showEmptyState('No orders found in your account');
                }
            } catch (error) {
                console.error('Error loading orders:', error);
                showEmptyState('Error loading orders: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function updateStats() {
            document.getElementById('totalOrders').textContent = allOrders.length;
            
            const inTransit = allOrders.filter(o => {
                const statusClass = getStatusClass(o.status);
                return statusClass === 'in-transit';
            }).length;
            document.getElementById('inTransitOrders').textContent = inTransit;

            const delivered = allOrders.filter(o => {
                const statusClass = getStatusClass(o.status);
                return statusClass === 'delivered';
            }).length;
            document.getElementById('deliveredOrders').textContent = delivered;

            const pending = allOrders.filter(o => {
                const statusClass = getStatusClass(o.status);
                return statusClass === 'created' || statusClass === 'picked';
            }).length;
            document.getElementById('pendingOrders').textContent = pending;
        }

        function displayOrders() {
            const container = document.getElementById('ordersContainer');
            
            if (filteredOrders.length === 0) {
                showEmptyState();
                return;
            }

            const startIdx = (currentPage - 1) * ordersPerPage;
            const endIdx = startIdx + ordersPerPage;
            const pageOrders = filteredOrders.slice(startIdx, endIdx);

            const tableHtml = `
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Tracking #</th>
                            <th>Customer</th>
                            <th>Destination</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${pageOrders.map(order => `
                            <tr onclick="viewOrder('${order.tracking}')">
                                <td><strong>${order.tracking}</strong></td>
                                <td>${order.recipientName || 'N/A'}</td>
                                <td>Wilaya ${order.destLocationCity || 'N/A'}</td>
                                <td><span class="status-badge ${getStatusClass(order.status)}">${statusTranslations[order.status] || order.status}</span></td>
                                <td>${formatDate(order.created_at)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            container.innerHTML = tableHtml;
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredOrders.length / ordersPerPage);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = `
                <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Previous</button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button onclick="changePage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<button disabled>...</button>`;
                }
            }

            html += `
                <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>
            `;

            pagination.innerHTML = html;
        }

        function changePage(page) {
            const totalPages = Math.ceil(filteredOrders.length / ordersPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            displayOrders();
        }

        function applyFilters() {
            const searchTracking = document.getElementById('searchTracking').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;

            filteredOrders = allOrders.filter(order => {
                let match = true;

                if (searchTracking && !order.tracking.toLowerCase().includes(searchTracking)) {
                    match = false;
                }

                if (statusFilter && getStatusClass(order.status) !== statusFilter) {
                    match = false;
                }

                if (dateFrom && new Date(order.created_at) < new Date(dateFrom)) {
                    match = false;
                }

                if (dateTo && new Date(order.created_at) > new Date(dateTo)) {
                    match = false;
                }

                return match;
            });

            currentPage = 1;
            displayOrders();
        }

        function getStatusClass(status) {
            if (status === 'livred' || status === 'livre_non_encaisse' || status === 'paye_et_archive') return 'delivered';
            if (status.includes('return') || status.includes('retour') || status === 'annule') return 'returned';
            if (status === 'dispatched_to_driver' || status === 'attempt_delivery' || status === 'en_livraison' || status === 'vers_wilaya') return 'in-transit';
            if (status === 'picked' || status === 'accepted_by_carrier' || status === 'en_hub' || status === 'vers_hub' || status === 'en_ramassage') return 'picked';
            if (status === 'suspendu') return 'suspended';
            return 'created';
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
        }

        function viewOrder(tracking) {
            window.location.href = `track-order.html?tracking=${tracking}`;
        }

        function showEmptyState(message = 'No orders found') {
            document.getElementById('ordersContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <h3>${message}</h3>
                    <p>Try adjusting your filters or create a new order</p>
                </div>
            `;
            document.getElementById('pagination').innerHTML = '';
        }

        // Real-time search
        document.getElementById('searchTracking').addEventListener('input', applyFilters);
        document.getElementById('statusFilter').addEventListener('change', applyFilters);
        document.getElementById('dateFrom').addEventListener('change', applyFilters);
        document.getElementById('dateTo').addEventListener('change', applyFilters);
    </script>
</body>
</html>
